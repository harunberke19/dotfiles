# ==============================================================================
# GOTH THEME: VOID & BLOOD
# ==============================================================================

# --- 1. VARIABLES (PALETTE) ---
set $goth-bg     #050505
set $goth-fg     #dcdcdc
set $goth-red    #5c0a0a
set $goth-grey   #222222
set $goth-alert  #800000

# Gaps configuration
# 'inner' is the space between windows
# 'outer' is the space between the windows and the screen edge
gaps inner 10
gaps outer 5

# Smart Gaps: If you want gaps to disappear when there is only one window
smart_gaps off

# --- 2. WINDOW LOOK (BORDERS & GAPS) ---
# No title bars, just pixels
default_border pixel 2
default_floating_border pixel 2


# --- 3. WINDOW COLORS ---
#                       border      background  text       indicator   child_border
client.focused          $goth-red   $goth-bg    $goth-fg   $goth-red   $goth-red
client.focused_inactive $goth-grey  $goth-bg    $goth-fg   $goth-grey  $goth-grey
client.unfocused        $goth-grey  $goth-bg    $goth-fg   $goth-grey  $goth-bg
client.urgent           $goth-alert $goth-alert $goth-fg   $goth-alert $goth-alert
client.placeholder      $goth-bg    $goth-bg    $goth-fg   $goth-bg    $goth-bg
client.background       $goth-bg

# --- 4. i3BAR CONFIGURATION ---
# We define the bar HERE so it matches the theme perfectly.
bar {
    status_command i3status
    position top
    
    # Font for the bar (Change 'pango:monospace' to your preferred font if needed)
    font pango:monospace 10

    colors {
        background $goth-bg
        statusline $goth-fg
        separator  $goth-grey

        #                  border       background   text
        focused_workspace  $goth-red    $goth-red    $goth-fg
        active_workspace   $goth-grey   $goth-grey   $goth-fg
        inactive_workspace $goth-bg     $goth-bg     $goth-grey
        urgent_workspace   $goth-alert  $goth-alert  $goth-fg
        binding_mode       $goth-alert  $goth-alert  $goth-fg
    }
}
